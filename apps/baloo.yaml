apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: baloo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/alpar-t/homelab
    targetRevision: main
    path: config/baloo/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: baloo
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: baloo-secrets
      jsonPointers:
        - /data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
