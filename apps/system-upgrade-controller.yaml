# System Upgrade Controller - automated k3s upgrades
# https://github.com/rancher/system-upgrade-controller
#
# To upgrade k3s: update the version in
# config/system-upgrade-controller/manifests/k3s-upgrade-plan.yaml

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: system-upgrade-controller
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/alpar-t/homelab
    targetRevision: main
    path: config/system-upgrade-controller/manifests
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
