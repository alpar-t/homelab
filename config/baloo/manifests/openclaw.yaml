# OpenClaw gateway with git-sync sidecar.
#
# The homelab repo is public so git-sync uses HTTPS — no deploy key needed.
# git-sync clones the repo into an emptyDir at /git.
# OpenClaw reads its config and agent workspaces directly from /git/link/config/baloo/.
# Writable state (WA session auth, credentials) lives on the Longhorn PVC at /state.
#
# Config changes (SOUL.md, AGENTS.md) propagate on the next conversation without restart.
# openclaw.json changes (bindings, tool policies) require a new pod — the render-config
# init container bakes the config at startup and CrashLoopBackOff restarts don't re-run it.
#   kubectl rollout restart deployment/openclaw -n baloo
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: baloo
  labels:
    app.kubernetes.io/name: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw
      annotations:
        homelab/config-rev: "2026-06-29a"
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # One-shot clone so the repo is on disk before render-config runs.
        - name: git-sync-init
          image: registry.k8s.io/git-sync/git-sync:v4.7.0@sha256:d232fd13474ba1b46dba431af2b1411b9d9afacda55ae644d2a32e43975128dd
          args:
            - --repo=https://github.com/alpar-t/homelab.git
            - --root=/git
            - --link=link
            - --depth=1
            - --one-time
          securityContext:
            runAsUser: 65533
            runAsGroup: 65533
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: git-repo
              mountPath: /git
            - name: tmp
              mountPath: /tmp
        # Substitute ${BALOO_OWNER_PHONE} into openclaw.json → /rendered/openclaw.json
        - name: render-config
          image: ghcr.io/openclaw/openclaw:2026.6.11@sha256:ced693754e14ef5d66495db1d098f40fe07819b4b119b0f68de2a361fa83815b
          command:
            - node
            - -e
            - |
              const fs = require('fs');
              const src = fs.readFileSync('/git/link/config/baloo/openclaw.json', 'utf8');
              const out = src.replace(/\$\{([^}]+)\}/g, (_, k) => process.env[k] ?? _);
              fs.writeFileSync('/rendered/openclaw.json', out);
          env:
            - name: BALOO_OWNER_PHONE
              valueFrom:
                secretKeyRef:
                  name: baloo-secrets
                  key: BALOO_OWNER_PHONE
            - name: KINGA_PHONE
              valueFrom:
                secretKeyRef:
                  name: baloo-secrets
                  key: KINGA_PHONE
            - name: BALOO_SHEF_GROUP
              valueFrom:
                secretKeyRef:
                  name: baloo-secrets
                  key: BALOO_SHEF_GROUP
            - name: BALOO_GARDEN_GROUP
              valueFrom:
                secretKeyRef:
                  name: baloo-secrets
                  key: BALOO_GARDEN_GROUP
            - name: BALOO_TRIPS_PALKOEK_GROUP
              valueFrom:
                secretKeyRef:
                  name: baloo-secrets
                  key: BALOO_TRIPS_PALKOEK_GROUP
                  optional: true
            - name: HA_TOKEN_READONLY
              valueFrom:
                secretKeyRef:
                  name: baloo-secrets
                  key: HA_TOKEN_READONLY
            - name: TREK_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: baloo-secrets
                  key: TREK_CLIENT_ID
            - name: TREK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: baloo-secrets
                  key: TREK_CLIENT_SECRET
            # CDP token for the isolated browser pod (config/baloo/manifests/browser.yaml).
            # Optional so the pod still renders before the secret key is created.
            - name: BROWSER_CDP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: baloo-secrets
                  key: BROWSER_CDP_TOKEN
                  optional: true
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: git-repo
              mountPath: /git
              readOnly: true
            - name: rendered
              mountPath: /rendered
        # Keep state-installed plugins (whatsapp, browser) in lockstep with the
        # pinned core image. Plugins live in the /state PVC and are installed
        # once, so a core image bump leaves them stale — that drift shipped a
        # whatsapp plugin without inbound location parsing (2026-07-06). This
        # resolves each tracked plugin to the ClawHub version compatible with
        # the running core. Non-fatal: if ClawHub is unreachable at boot we keep
        # the last-good plugin already on the PVC rather than crash-looping.
        - name: plugin-sync
          image: ghcr.io/openclaw/openclaw:2026.6.11@sha256:ced693754e14ef5d66495db1d098f40fe07819b4b119b0f68de2a361fa83815b
          command:
            - sh
            - -c
            - node /app/dist/index.js plugins update --all || true
          env:
            - name: HOME
              value: /state/home
            - name: OPENCLAW_STATE_DIR
              value: /state
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: state
              mountPath: /state
            - name: tmp
              mountPath: /tmp
      containers:
        # Continuous sync sidecar — keeps /git/link up to date with main.
        - name: git-sync
          image: registry.k8s.io/git-sync/git-sync:v4.7.0@sha256:d232fd13474ba1b46dba431af2b1411b9d9afacda55ae644d2a32e43975128dd
          args:
            - --repo=https://github.com/alpar-t/homelab.git
            - --root=/git
            - --link=link
            - --depth=1
            - --period=60s
          securityContext:
            runAsUser: 65533
            runAsGroup: 65533
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: git-repo
              mountPath: /git
            - name: tmp
              mountPath: /tmp

        - name: openclaw
          image: ghcr.io/openclaw/openclaw:2026.6.11@sha256:ced693754e14ef5d66495db1d098f40fe07819b4b119b0f68de2a361fa83815b
          imagePullPolicy: IfNotPresent
          command:
            - node
            - /app/dist/index.js
            - gateway
            - run
          ports:
            - name: gateway
              containerPort: 18789
              protocol: TCP
          env:
            - name: HOME
              value: /state/home
            - name: NODE_ENV
              value: production
            - name: PATH
              value: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            - name: OPENCLAW_CONFIG_PATH
              value: /rendered/openclaw.json
            - name: OPENCLAW_STATE_DIR
              value: /state
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: baloo-secrets
                  key: OPENCLAW_GATEWAY_TOKEN
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: baloo-secrets
                  key: ANTHROPIC_API_KEY
            - name: GOOGLE_MAPS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: baloo-secrets
                  key: GOOGLE_MAPS_API_KEY
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: baloo-github-app
                  key: app-id
            - name: GITHUB_APP_INSTALLATION_ID
              value: "142711366"
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://127.0.0.1:18789/healthz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://127.0.0.1:18789/readyz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: git-repo
              mountPath: /git
              readOnly: true
            - name: rendered
              mountPath: /rendered
            - name: state
              mountPath: /state
            - name: tmp
              mountPath: /tmp
            - name: github-app-key
              mountPath: /var/run/secrets/github-app
              readOnly: true

      volumes:
        - name: git-repo
          emptyDir: {}
        - name: rendered
          emptyDir: {}
        - name: state
          persistentVolumeClaim:
            claimName: openclaw-state
        - name: tmp
          emptyDir: {}
        - name: github-app-key
          secret:
            secretName: baloo-github-app
            items:
              - key: private-key
                path: private-key.pem
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: baloo
  labels:
    app.kubernetes.io/name: openclaw
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: openclaw
  ports:
    - name: gateway
      port: 18789
      targetPort: 18789
