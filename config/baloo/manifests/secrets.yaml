# Secrets for Baloo. Create manually before first deploy — do NOT commit real values.
#
#   kubectl create secret generic baloo-secrets -n baloo \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-... \
#     --from-literal=OPENCLAW_GATEWAY_TOKEN=$(openssl rand -hex 32)
#
# The repo is public so git-sync needs no credentials.
# WhatsApp session auth is written by OpenClaw itself into the state PVC.
apiVersion: v1
kind: Secret
metadata:
  name: baloo-secrets
  namespace: baloo
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "REPLACE_ME"
  OPENCLAW_GATEWAY_TOKEN: "REPLACE_ME"
