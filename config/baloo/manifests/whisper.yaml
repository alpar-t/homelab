apiVersion: v1
kind: ConfigMap
metadata:
  name: whisper-http-script
  namespace: baloo
data:
  whisper-http.py: |
    #!/usr/src/.venv/bin/python3
    """
    HTTP bridge for wyoming-whisper-intel (whisper.cpp + Intel GPU).
    POST /transcribe with raw audio body (any format PyAV supports) → transcript text.
    Bridges to the wyoming server on localhost:7891 using the wyoming Python library.
    """
    from http.server import HTTPServer, BaseHTTPRequestHandler
    import asyncio, av, io, sys

    from wyoming.audio import AudioChunk, AudioStart, AudioStop
    from wyoming.client import AsyncTcpClient

    WYOMING_HOST = '127.0.0.1'
    WYOMING_PORT = 7891
    HTTP_PORT = 10301
    RATE = 16000


    def to_pcm(data: bytes) -> bytes:
        buf = b''
        container = av.open(io.BytesIO(data))
        resampler = av.AudioResampler(format='s16', layout='mono', rate=RATE)
        for frame in container.decode(audio=0):
            frame.pts = None
            for r in resampler.resample(frame):
                buf += bytes(r.planes[0])
        for r in resampler.resample(None):
            buf += bytes(r.planes[0])
        return buf


    async def transcribe(pcm: bytes) -> str:
        async with AsyncTcpClient(WYOMING_HOST, WYOMING_PORT) as client:
            await client.write_event(AudioStart(rate=RATE, width=2, channels=1).event())
            for i in range(0, len(pcm), 8192):
                chunk = pcm[i:i + 8192]
                await client.write_event(AudioChunk(rate=RATE, width=2, channels=1, audio=chunk).event())
            await client.write_event(AudioStop().event())
            while True:
                event = await asyncio.wait_for(client.read_event(), timeout=600)
                if event is None:
                    raise RuntimeError('wyoming connection closed')
                if event.type == 'transcript':
                    return (event.data or {}).get('text', '')
                if event.type == 'error':
                    raise RuntimeError(f'wyoming error: {event.data}')


    class Handler(BaseHTTPRequestHandler):
        def do_POST(self):
            if self.path != '/transcribe':
                self.send_error(404)
                return
            try:
                n = int(self.headers.get('Content-Length', 0))
                audio = self.rfile.read(n)
                pcm = to_pcm(audio)
                text = asyncio.run(transcribe(pcm))
                body = text.encode('utf-8')
                self.send_response(200)
                self.send_header('Content-Type', 'text/plain; charset=utf-8')
                self.send_header('Content-Length', str(len(body)))
                self.end_headers()
                self.wfile.write(body)
            except Exception as e:
                self.send_error(500, str(e))

        def log_message(self, *_):
            pass


    print(f'whisper-http listening on :{HTTP_PORT}', flush=True)
    HTTPServer(('', HTTP_PORT), Handler).serve_forever()
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: whisper-models-intel
  namespace: baloo
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-ssd-noreplica
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whisper
  namespace: baloo
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: whisper
  template:
    metadata:
      labels:
        app: whisper
    spec:
      # Prefer the high-memory node (pamacs) to keep heavy movable
      # workloads off the 15Gi nodes. See CLAUDE.md workload/cpu-intensive.
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: workload/cpu-intensive
                    operator: In
                    values:
                      - "true"
      containers:
        # whisper.cpp with Intel GPU acceleration via oneAPI/Level Zero.
        # Model (ggml-large-v3.bin) is downloaded to the PVC on first start.
        - name: whisper
          image: ghcr.io/sjtrny/wyoming-whisper-intel:release@sha256:518e804b7464856b9506e48260047aad68732cb1e19b4331067be0414e455def
          env:
            - name: ONEAPI_DEVICE_SELECTOR
              value: "level_zero:gpu"
            - name: ZE_ENABLE_PCI_ID_DEVICE_ORDER
              value: "1"
            - name: WHISPER_MODEL
              value: "small"
            - name: WHISPER_LANG
              value: "auto"
            - name: WHISPER_BEAM_SIZE
              value: "5"
            - name: WHISPER_HTTP_HOST
              value: "127.0.0.1"
            - name: WHISPER_HTTP_PORT
              value: "8910"
            - name: WYOMING_URI
              value: "tcp://0.0.0.0:7891"
          ports:
            - name: wyoming
              containerPort: 7891
              protocol: TCP
          volumeMounts:
            - name: models
              mountPath: /models
          resources:
            requests:
              cpu: 200m
              memory: 2Gi
              gpu.intel.com/i915: "1"
            limits:
              cpu: 2000m
              memory: 8Gi
              gpu.intel.com/i915: "1"
          startupProbe:
            tcpSocket:
              port: wyoming
            periodSeconds: 30
            failureThreshold: 60
          readinessProbe:
            tcpSocket:
              port: wyoming
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: wyoming
            periodSeconds: 30
            failureThreshold: 3

        # HTTP bridge: accepts raw audio (any PyAV-supported format), converts to
        # PCM16, speaks Wyoming to localhost:7891, returns transcript as text.
        - name: whisper-http
          image: rhasspy/wyoming-whisper:3.1.0@sha256:9501d2659eee83b6eead98d53842193e5fed011eda6c5b1c3ad36f3146b28fed
          command: ["/usr/src/.venv/bin/python3", "/scripts/whisper-http.py"]
          ports:
            - name: http
              containerPort: 10301
              protocol: TCP
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10

      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: whisper-models-intel
        - name: scripts
          configMap:
            name: whisper-http-script
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: whisper
  namespace: baloo
  annotations:
    # MetalLB LoadBalancer — reachable from HA at 192.168.1.102
    metallb.universe.tf/address-pool: lan-pool
spec:
  type: LoadBalancer
  selector:
    app: whisper
  ports:
    - name: wyoming
      port: 10300
      targetPort: 7891
      protocol: TCP
    - name: http
      port: 10301
      targetPort: http
      protocol: TCP
