apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflared
data:
  config.yaml: |
    # Replace YOUR_TUNNEL_ID with your actual tunnel ID
    tunnel: YOUR_TUNNEL_ID
    credentials-file: /etc/cloudflared/creds/credentials.json
    metrics: 0.0.0.0:2000
    no-autoupdate: true

    ingress:
      # Route headscale directly - bypasses ingress-nginx so the TS2021 Upgrade header
      # doesn't have to traverse an extra reverse proxy that might strip it
      - hostname: vpn.newjoy.ro
        service: http://headscale.headscale.svc.cluster.local:80
      # Route all other traffic to ingress-nginx
      - service: http://ingress-nginx-controller.ingress-nginx.svc.cluster.local:80

