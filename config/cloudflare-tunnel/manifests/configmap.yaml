apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: cloudflared
data:
  config.yaml: |
    # Replace YOUR_TUNNEL_ID with your actual tunnel ID
    tunnel: YOUR_TUNNEL_ID
    credentials-file: /etc/cloudflared/creds/credentials.json
    metrics: 0.0.0.0:2000
    no-autoupdate: true

    ingress:
      # SSH access via Cloudflare Access (browser-rendered terminal).
      # Auth gate is in the Cloudflare dashboard; this rule just routes
      # ssh.newjoy.ro to buksi's sshd.
      # See runbooks/cloudflare-access-ssh.md
      - hostname: ssh.newjoy.ro
        service: ssh://192.168.1.174:22

      # Route all other traffic to ingress-nginx
      # Each app defines its own Ingress resource for routing
      - service: http://ingress-nginx-controller.ingress-nginx.svc.cluster.local:80

