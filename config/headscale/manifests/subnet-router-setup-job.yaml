---
# RBAC for subnet router setup job
apiVersion: v1
kind: ServiceAccount
metadata:
  name: subnet-router-setup
  namespace: headscale
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: subnet-router-setup
  namespace: headscale
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: subnet-router-setup
  namespace: headscale
subjects:
  - kind: ServiceAccount
    name: subnet-router-setup
    namespace: headscale
roleRef:
  kind: Role
  name: subnet-router-setup
  apiGroup: rbac.authorization.k8s.io
---
# Job to create pre-auth key and secret for subnet router
apiVersion: batch/v1
kind: Job
metadata:
  name: subnet-router-setup
  namespace: headscale
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: subnet-router-setup
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: bitnami/kubectl:latest@sha256:3220dcc839f55be732a29548043a1ddf635a0dd6c8781b0f2a0bcdc19029c7d3
          command:
            - /bin/bash
            - -c
            - |
              set -e

              echo "=== Subnet Router Setup ==="

              # Check if secret already exists
              if kubectl get secret tailscale-auth -n headscale >/dev/null 2>&1; then
                echo "Secret tailscale-auth already exists, skipping"
                exit 0
              fi

              # ArgoCD sync wave guarantees headscale (wave 0) is Available before this job (wave 1) runs.
              # No kubectl wait needed - just get the pod name.

              # Get headscale pod name
              HEADSCALE_POD=$(kubectl get pods -n headscale -l app=headscale -o jsonpath='{.items[0].metadata.name}')
              echo "Using Headscale pod: $HEADSCALE_POD"
              
              # Create a user if it doesn't exist (headscale v0.28+ requires numeric user ID)
              echo "Ensuring default user exists..."
              kubectl exec -n headscale "$HEADSCALE_POD" -- headscale users create default 2>/dev/null || true

              # Get numeric user ID (v0.28 -u flag expects uint, not name)
              USER_ID=$(kubectl exec -n headscale "$HEADSCALE_POD" -- \
                headscale users list -o json | \
                tr -d ' ' | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
              echo "User ID: $USER_ID"

              # Create pre-auth key (reusable, 1 year expiry, tagged so autoApprovers matches)
              echo "Creating pre-auth key..."
              AUTHKEY=$(kubectl exec -n headscale "$HEADSCALE_POD" -- \
                headscale preauthkeys create \
                  --reusable \
                  --expiration 365d \
                  -u "$USER_ID" \
                  --tags tag:subnet-router \
                  -o json | \
                tr -d ' ' | grep -o '"key":"[^"]*"' | cut -d'"' -f4)
              
              if [ -z "$AUTHKEY" ]; then
                echo "Failed to create auth key"
                exit 1
              fi
              
              echo "Auth key created successfully"
              
              # Create the secret
              echo "Creating tailscale-auth secret..."
              kubectl create secret generic tailscale-auth \
                --namespace=headscale \
                --from-literal=authkey="$AUTHKEY"
              
              echo "=== Setup complete ==="
              echo "The subnet router will auto-connect when it starts"
              echo "Routes for 192.168.1.0/24 will be auto-approved via ACL autoApprovers"

