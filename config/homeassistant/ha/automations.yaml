- id: '1761501054969'
  alias: Open Gate When Approaching
  description: ''
  triggers:
  - trigger: zone
    entity_id: device_tracker.alpar
    zone: zone.arriving_home
    event: enter
  - trigger: zone
    entity_id: person.kinga
    zone: zone.arriving_home
    event: enter
  - trigger: zone
    entity_id: person.marci
    zone: zone.home
    event: enter
  conditions: []
  actions:
  - action: cover.open_cover
    metadata: {}
    data: {}
    target:
      entity_id: cover.gate
  - if:
    - condition: sun
      after: sunset
      after_offset: '-2'
      before: sunrise
    then:
    - action: switch.turn_on
      metadata: {}
      data: {}
      target:
        entity_id: switch.double_switch_2_3
  - delay:
      hours: 0
      minutes: 15
      seconds: 0
      milliseconds: 0
  - action: cover.close_cover
    metadata: {}
    data: {}
    target:
      entity_id: cover.gate
  - action: switch.turn_off
    metadata: {}
    data: {}
    target:
      entity_id: switch.double_switch_2_3
  mode: single
- id: hot_water_circulation_time_1
  alias: Hot Water Circulation - Time Based
  description: Turn off circulation at night (11 PM - 6 AM)
  triggers:
  - at: 06:00:00
    trigger: time
  - at: '23:00:00'
    trigger: time
  actions:
  - choose:
    - conditions:
      - condition: time
        after: 06:00:00
        before: '23:00:00'
      sequence:
      - target:
          entity_id:
          - switch.peter_mester_hot_water_circulation
          - switch.peter_mester_hot_water_pump
        action: switch.turn_on
    default:
    - target:
        entity_id:
        - switch.peter_mester_hot_water_circulation
        - switch.peter_mester_hot_water_pump
      action: switch.turn_off
  mode: restart
