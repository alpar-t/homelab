- id: '1778061301513'
  alias: Smart Irrigation → IU duration sync
  description: When Smart Irrigation publishes a new computed duration for an ET zone,
    push it into the corresponding zone within the IU "Daily lawn+garden" sequence
    via adjust_time.
  triggers:
  - platform: state
    entity_id:
    - sensor.smart_irrigation_fu_elol
    - sensor.smart_irrigation_fu_hatul
    - sensor.smart_irrigation_vetemenyes
    - sensor.smart_irrigation_grupp
  actions:
  - variables:
      si_to_seq_zone:
        sensor.smart_irrigation_fu_elol: 1
        sensor.smart_irrigation_fu_hatul: 2
        sensor.smart_irrigation_vetemenyes: 3
        sensor.smart_irrigation_grupp: 4
      seq_zone: '{{ si_to_seq_zone[trigger.entity_id] }}'
      seconds: '{{ trigger.to_state.state | int(0) }}'
  - data:
      entity_id: binary_sensor.irrigation_unlimited_c1_s1
      zones: '{{ [seq_zone] }}'
      actual: '{{ timedelta(seconds=seconds) }}'
    action: irrigation_unlimited.adjust_time
  mode: queued
  max: 10
- id: '1778061304829'
  alias: Smart Irrigation reset bucket after IU run
  description: After IU completes a scheduled sequence run, reset SI buckets for each
    ET zone that actually ran (duration > 0).
  triggers:
  - platform: event
    event_type: irrigation_unlimited_finish
    event_data:
      entity_id: binary_sensor.irrigation_unlimited_c1_s1
  conditions:
  - condition: template
    value_template: '{{ trigger.event.data.schedule.index is not none }}'
  actions:
  - variables:
      zone_id_to_si:
        '1': sensor.smart_irrigation_fu_elol
        '2': sensor.smart_irrigation_fu_hatul
        '3': sensor.smart_irrigation_vetemenyes
        '4': sensor.smart_irrigation_grupp
  - repeat:
      for_each: '{{ trigger.event.data.zone_ids }}'
      sequence:
      - target:
          entity_id: '{{ zone_id_to_si[repeat.item | string] }}'
        action: smart_irrigation.reset_bucket
  mode: single
- id: '1778061308949'
  alias: Cserep moisture-gated irrigation
  description: >
    Run Cserep zone 3x morning (07:00, 08:00, 09:00) and 3x evening (19:00, 20:00,
    21:00) for 7 minutes each. Skips if IU controller is already running (c1_m on)
    to prevent concurrent zone runs. Also skips if both moisture sensors are above 40%.
    Bypasses Smart Irrigation since Cserep is on a covered terrace and rain doesn't reach it.
  triggers:
  - platform: time
    at: '07:00:00'
  - platform: time
    at: '08:00:00'
  - platform: time
    at: '09:00:00'
  - platform: time
    at: '19:00:00'
  - platform: time
    at: '20:00:00'
  - platform: time
    at: '21:00:00'
  conditions:
  - condition: state
    entity_id: binary_sensor.irrigation_unlimited_c1_m
    state: 'off'
  - condition: or
    conditions:
    - condition: numeric_state
      entity_id: sensor.cherep_soil_moisture_min
      below: 40
    - condition: numeric_state
      entity_id: sensor.gw1100a_soil_moisture_8
      below: 40
  actions:
  - data:
      entity_id: binary_sensor.irrigation_unlimited_c1_z5
      time: 00:07:00
    action: irrigation_unlimited.manual_run
  mode: single
- id: '1778061312938'
  alias: Smart Irrigation re-sync after HA restart
  description: Trigger Smart Irrigation to recalculate all zones 1 minute after HA
    restart, so the SI → IU duration sync automation pushes fresh durations into IU.
    Needed because IU adjust_time adjustments don't persist across restarts.
  triggers:
  - platform: homeassistant
    event: start
  actions:
  - delay: 00:01:00
  - action: smart_irrigation.calculate_all_zones
  mode: single

- id: ac_solar_surplus_on
  alias: "AC: Solar surplus → turn on cooling"
  description: >
    Turns on upstairs AC when solar exports ≥3 kW for 5 minutes and at least
    one bedroom is above 21.5°C. 5-minute minimum off time protects compressor.
    Estimated AC draw: ~2800W (28000 BTU @ EER 10).
    Note: uses single climate.set_temperature call with hvac_mode to avoid
    Midea integration race condition when two calls fire in rapid succession.
  triggers:
    - trigger: numeric_state
      entity_id: sensor.grid_power
      below: -3000
      for:
        minutes: 5
    - trigger: time_pattern
      minutes: "/5"
  conditions:
    - condition: time
      after: "08:30:00"
      before: "21:00:00"
    - condition: state
      entity_id: climate.152832116398499_climate
      state: "off"
    - condition: template
      value_template: >
        {{ (now() - states['climate.152832116398499_climate'].last_changed).total_seconds() > 300 }}
    - condition: numeric_state
      entity_id: sensor.grid_power
      below: -3000
    - condition: numeric_state
      entity_id: sensor.gw1100a_outdoor_temperature
      above: 21
    - condition: or
      conditions:
        - condition: numeric_state
          entity_id: sensor.girls_bedroom_air_quality_sensor_air_temperature
          above: 21.5
        - condition: numeric_state
          entity_id: sensor.bedroom_air_sensor_air_temperature
          above: 21.5
  actions:
    - action: climate.set_temperature
      target:
        entity_id: climate.152832116398499_climate
      data:
        hvac_mode: cool
        temperature: 24
  mode: single

- id: ac_high_temp_on
  alias: "AC: High temperature override → turn on cooling"
  description: >
    Turns on upstairs AC regardless of solar when either bedroom exceeds 25°C
    for 5 minutes. 5-minute minimum off time protects compressor.
  triggers:
    - trigger: numeric_state
      entity_id: sensor.girls_bedroom_air_quality_sensor_air_temperature
      above: 25
      for:
        minutes: 5
    - trigger: numeric_state
      entity_id: sensor.bedroom_air_sensor_air_temperature
      above: 25
      for:
        minutes: 5
    - trigger: time_pattern
      minutes: "/5"
  conditions:
    - condition: time
      after: "08:30:00"
      before: "21:00:00"
    - condition: numeric_state
      entity_id: sensor.gw1100a_outdoor_temperature
      above: 21
    - condition: state
      entity_id: climate.152832116398499_climate
      state: "off"
    - condition: template
      value_template: >
        {{ (now() - states['climate.152832116398499_climate'].last_changed).total_seconds() > 300 }}
    - condition: or
      conditions:
        - condition: numeric_state
          entity_id: sensor.girls_bedroom_air_quality_sensor_air_temperature
          above: 25
        - condition: numeric_state
          entity_id: sensor.bedroom_air_sensor_air_temperature
          above: 25
  actions:
    - action: climate.set_temperature
      target:
        entity_id: climate.152832116398499_climate
      data:
        hvac_mode: cool
        temperature: 24
  mode: single

- id: ac_no_surplus_off
  alias: "AC: No solar surplus → turn off cooling"
  description: >
    Turns off AC when grid export drops below 2.5 kW for 10 minutes AND both
    bedrooms are below 25°C. If either room is at or above 25°C the AC stays
    on regardless of solar export. 10-minute minimum on time.
  triggers:
    - trigger: numeric_state
      entity_id: sensor.grid_power
      above: -2500
      for:
        minutes: 10
    - trigger: time_pattern
      minutes: "/10"
  conditions:
    - condition: not
      conditions:
        - condition: state
          entity_id: climate.152832116398499_climate
          state: "off"
    - condition: template
      value_template: >
        {{ (now() - states['climate.152832116398499_climate'].last_changed).total_seconds() > 600 }}
    - condition: numeric_state
      entity_id: sensor.grid_power
      above: -2500
    - condition: numeric_state
      entity_id: sensor.girls_bedroom_air_quality_sensor_air_temperature
      below: 25
    - condition: numeric_state
      entity_id: sensor.bedroom_air_sensor_air_temperature
      below: 25
  actions:
    - action: climate.turn_off
      target:
        entity_id: climate.152832116398499_climate
  mode: single

- id: ac_overcooled_off
  alias: "AC: Rooms overcooled → turn off cooling"
  description: >
    Turns off AC when BOTH bedrooms drop below 21°C for 5 minutes, regardless
    of solar. 10-minute minimum on time protects compressor.
  triggers:
    - trigger: template
      value_template: >
        {{ states('sensor.girls_bedroom_air_quality_sensor_air_temperature') | float(99) < 21
           and states('sensor.bedroom_air_sensor_air_temperature') | float(99) < 21 }}
      for:
        minutes: 5
  conditions:
    - condition: not
      conditions:
        - condition: state
          entity_id: climate.152832116398499_climate
          state: "off"
    - condition: template
      value_template: >
        {{ (now() - states['climate.152832116398499_climate'].last_changed).total_seconds() > 600 }}
  actions:
    - action: climate.turn_off
      target:
        entity_id: climate.152832116398499_climate
  mode: single

- id: ac_evening_off
  alias: "AC: Turn off at 20:00"
  description: Hard cutoff — turns off the upstairs AC at 20:00 if still running.
  triggers:
    - trigger: time
      at: "21:00:00"
  conditions:
    - condition: not
      conditions:
        - condition: state
          entity_id: climate.152832116398499_climate
          state: "off"
  actions:
    - action: climate.turn_off
      target:
        entity_id: climate.152832116398499_climate
  mode: single

- id: ac_outdoor_cool_off
  alias: "AC: Outdoor temperature cool → turn off cooling"
  description: >
    Turns off AC when outdoor temperature drops to ≤21°C for 10 minutes.
    No point cooling indoors when it's already cool outside.
    Respects 10-minute minimum on time.
  triggers:
    - trigger: numeric_state
      entity_id: sensor.gw1100a_outdoor_temperature
      below: 21
      for:
        minutes: 10
    - trigger: time_pattern
      minutes: "/10"
  conditions:
    - condition: not
      conditions:
        - condition: state
          entity_id: climate.152832116398499_climate
          state: "off"
    - condition: template
      value_template: >
        {{ (now() - states['climate.152832116398499_climate'].last_changed).total_seconds() > 600 }}
    - condition: numeric_state
      entity_id: sensor.gw1100a_outdoor_temperature
      below: 21
  actions:
    - action: climate.turn_off
      target:
        entity_id: climate.152832116398499_climate
  mode: single

- id: front_door_eloszoba_light_control
  alias: "Front Door: Előszoba light on when door opens at dark"
  description: Turns on the hallway light when the front door opens and it's dark outside.
  triggers:
    - trigger: state
      entity_id: binary_sensor.front_door_door
      to: "on"
  conditions:
    - condition: state
      entity_id: binary_sensor.is_dark_mode
      state: "on"
  actions:
    - action: light.turn_on
      target:
        entity_id: light.eloszoba
  mode: single
