# Immich Machine Learning Service
# Handles: face detection, face recognition, CLIP smart search, OCR
#
# Horizontally scaled across nodes (StatefulSet, 1 pod per node) so each
# replica has dedicated access to its node's Intel iGPU via the OpenVINO
# execution provider. Each replica owns its own model cache (RWO).

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: immich-ml
  namespace: immich
  labels:
    app: immich-ml
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 3
  serviceName: immich-ml
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: immich-ml
  template:
    metadata:
      labels:
        app: immich-ml
    spec:
      affinity:
        # One ML pod per node so each replica gets a dedicated iGPU.
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: immich-ml
              topologyKey: kubernetes.io/hostname

      containers:
        - name: immich-ml
          # OpenVINO variant: ONNX inference runs on Intel iGPU instead of CPU.
          image: ghcr.io/immich-app/immich-machine-learning:v2.6.1-openvino@sha256:bd5aa51a9f9a17eebf17daa7731b3bacd71a4aa542ce424d3adb06552b40e905
          ports:
            - containerPort: 3003
              name: http
          env:
            - name: MACHINE_LEARNING_CACHE_FOLDER
              value: "/cache"
            - name: MACHINE_LEARNING_CLIP_MODEL
              value: "ViT-B-32__openai"
            - name: MACHINE_LEARNING_FACIAL_RECOGNITION_MODEL
              value: "buffalo_l"
            # One worker per pod — inference serializes on a single iGPU,
            # parallelism comes from horizontal scaling across nodes.
            - name: MACHINE_LEARNING_WORKERS
              value: "1"
            - name: MACHINE_LEARNING_REQUEST_THREADS
              value: "4"

          volumeMounts:
            - name: model-cache
              mountPath: /cache

          resources:
            requests:
              cpu: 200m
              memory: 1Gi
              gpu.intel.com/i915: 1
            limits:
              cpu: 2
              memory: 4Gi
              gpu.intel.com/i915: 1

          startupProbe:
            httpGet:
              path: /ping
              port: http
            failureThreshold: 60
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 10
            timeoutSeconds: 5

  volumeClaimTemplates:
    - metadata:
        name: model-cache
        labels:
          app: immich
          data-criticality: rebuildable
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn-ssd
        resources:
          requests:
            storage: 10Gi
---
# Immich ML Service
apiVersion: v1
kind: Service
metadata:
  name: immich-ml
  namespace: immich
  labels:
    app: immich-ml
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  type: ClusterIP
  selector:
    app: immich-ml
  ports:
    - name: http
      port: 3003
      targetPort: 3003
      protocol: TCP

