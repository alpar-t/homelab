controller:
  # For Cloudflare Tunnel, we don't need external LoadBalancer
  service:
    type: ClusterIP
  
  # Get real client IPs from Cloudflare
  config:
    use-forwarded-headers: "true"
    compute-full-forwarded-for: "true"
    use-proxy-protocol: "false"
    # Enable snippets for Authelia forward auth
    allow-snippet-annotations: "true"
    # Required since ingress-nginx v1.12+ annotation validation (IngressNightmare fix)
    # configuration-snippet is "Critical" risk; without this, ingresses using it are silently dropped
    annotations-risk-level: "Critical"
    # Trust X-Forwarded-Proto from Cloudflare Tunnel
    proxy-real-ip-cidr: "0.0.0.0/0"
  
  # Resource limits for homelab
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  # Run on all nodes for availability
  replicaCount: 2

  # Ensure at least 1 replica survives during node drain
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  # Allow scheduling on control plane nodes
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

