# Longhorn Backup Exclusions
# This Job labels Longhorn volumes to exclude them from weekly backups.
# Run manually after adding new exclusions: kubectl apply -f this-file && kubectl wait --for=condition=complete job/longhorn-backup-exclusions -n longhorn-system
#
# Add PVC names to the EXCLUDED_PVCS list below (namespace/pvc-name format)

apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-exclusions
  namespace: longhorn-system
data:
  excluded-pvcs: |
    frigate/frigate-media
    # CNPG-managed Postgres PVCs - already backed up via WAL archiving + base backups.
    # Note: CNPG cluster replicas rotate (db-1 → db-2 → db-3 over time as nodes
    # fail over). When adding new clusters or hitting fresh replicas, append the
    # new PVC name here.
    vaultwarden/vaultwarden-db-1
    vaultwarden/vaultwarden-db-2
    pocket-id/pocket-id-db-1
    pocket-id/pocket-id-db-2
    immich/immich-db-2
    immich/immich-db-3
    stalwart-mail/stalwart-db-1
    stalwart-mail/stalwart-db-2
    paperless-ngx/paperless-db-1
    paperless-ngx/paperless-db-2
    homeassistant/homeassistant-db-1
    homeassistant/homeassistant-db-2
    tandoor/tandoor-db-2
    tandoor/tandoor-db-3
    roundcube/roundcube-db-1
    roundcube/roundcube-db-2
    # Immich rebuildable PVCs - can be regenerated from originals
    immich/immich-thumbs
    immich/immich-upload
    immich/immich-encoded-video
    immich/immich-import
    immich/immich-model-cache
    # Media stack — replaceable downloads and media library
    media/movies-data
    media/tv-data
    media/qbit-incomplete

---
apiVersion: batch/v1
kind: Job
metadata:
  name: longhorn-backup-exclusions
  namespace: longhorn-system
  annotations:
    # Re-run when configmap changes
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      serviceAccountName: longhorn-service-account
      restartPolicy: OnFailure
      containers:
        - name: label-volumes
          image: bitnami/kubectl:latest@sha256:fc4a5171e6c9a379a9dd86d43f851a6247c31ad3b5919e93f13e916820040b0b
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Applying backup exclusions..."
              
              while IFS= read -r pvc_ref; do
                # Skip empty lines and comments
                [[ -z "$pvc_ref" || "$pvc_ref" =~ ^# ]] && continue
                
                NAMESPACE=$(echo "$pvc_ref" | cut -d'/' -f1)
                PVC_NAME=$(echo "$pvc_ref" | cut -d'/' -f2)
                
                echo "Processing: $NAMESPACE/$PVC_NAME"
                
                # Get the PV name for this PVC
                PV_NAME=$(kubectl get pvc "$PVC_NAME" -n "$NAMESPACE" -o jsonpath='{.spec.volumeName}' 2>/dev/null || true)
                if [[ -z "$PV_NAME" ]]; then
                  echo "  WARNING: PVC $NAMESPACE/$PVC_NAME not found or not bound, skipping"
                  continue
                fi
                
                # Get the Longhorn volume name (CSI volume handle)
                VOLUME_NAME=$(kubectl get pv "$PV_NAME" -o jsonpath='{.spec.csi.volumeHandle}' 2>/dev/null || true)
                if [[ -z "$VOLUME_NAME" ]]; then
                  echo "  WARNING: Could not get volume handle for PV $PV_NAME, skipping"
                  continue
                fi
                
                # Check if volume exists in Longhorn
                if ! kubectl get volume "$VOLUME_NAME" -n longhorn-system &>/dev/null; then
                  echo "  WARNING: Longhorn volume $VOLUME_NAME not found, skipping"
                  continue
                fi
                
                # Per Longhorn design doc 20210624-label-driven-recurring-job:
                # "Label with `default` job-group if no other recurring job
                # label exists." So removing labels alone doesn't work — the
                # controller re-adds `default` within milliseconds, because
                # the volume now has no recurring-job label.
                #
                # The fix is to give the volume a marker recurring-job-group
                # label pointing to a non-existent group ("excluded"). That
                # counts as "another label" → suppresses the default
                # auto-add. No RecurringJob is in the `excluded` group, so
                # nothing actually fires on these volumes.
                kubectl label volume "$VOLUME_NAME" -n longhorn-system \
                  recurring-job-group.longhorn.io/excluded=enabled \
                  recurring-job-group.longhorn.io/default- \
                  recurring-job.longhorn.io/weekly-backup- \
                  --overwrite 2>/dev/null || true

                echo "  SUCCESS: Excluded $VOLUME_NAME (marker: excluded group)"
              done < /config/excluded-pvcs
              
              echo "Done!"
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          configMap:
            name: backup-exclusions

