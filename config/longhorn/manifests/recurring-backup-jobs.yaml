# Longhorn Recurring Backup Jobs
# Managed via GitOps
#
# These jobs automatically backup volumes to Backblaze B2
#
# Job Groups:
#   - default: Applies to ALL volumes automatically (weekly backups)
#   - critical: For important volumes requiring daily backups
#
# To exclude a volume from backups, add it to backup-exclusions.yaml
# To add daily backups for a volume, label it with:
#   recurring-job-group.longhorn.io/critical: enabled

---
# Weekly backup for ALL volumes (Tuesday 3:00 AM), keep 4 weeks
# The "default" group automatically applies to all volumes
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: weekly-backup
  namespace: longhorn-system
spec:
  name: weekly-backup
  task: backup
  cron: "0 3 * * 2"
  retain: 4
  concurrency: 2
  groups:
    - default

---
# Daily filesystem trim for ALL volumes at 1:00 AM
# Reclaims unused thin-provisioned blocks from Longhorn volumes.
# Critical for database volumes (PostgreSQL, etc.) where heavy overwrites
# cause actualSize to grow far beyond the volume capacity.
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: filesystem-trim
  namespace: longhorn-system
spec:
  name: filesystem-trim
  task: filesystem-trim
  cron: "0 1 * * *"
  retain: 0
  concurrency: 3
  groups:
    - default
    - critical

---
# Daily backup for critical volumes at 2:00 AM, keep 21 days
# To enable: add label recurring-job-group.longhorn.io/critical: enabled
apiVersion: longhorn.io/v1beta2
kind: RecurringJob
metadata:
  name: critical-daily-backup
  namespace: longhorn-system
spec:
  name: critical-daily-backup
  task: backup
  cron: "0 2 * * *"
  retain: 21
  concurrency: 2
  groups:
    - critical

