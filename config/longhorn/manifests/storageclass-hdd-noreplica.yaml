# Longhorn HDD storage class with no replication
# Use for data that doesn't need redundancy (e.g., camera recordings)
#
# Volumes from this class are tagged with the `excluded` recurring-job-group
# at provision time — single-replica volumes hold replaceable data and
# shouldn't be backed up to B2. We set a marker group instead of leaving
# the selector empty because Longhorn's controller will auto-add the
# `default` group whenever a volume has zero recurring-job labels (per
# design doc 20210624-label-driven-recurring-job). The marker counts as
# "a recurring job label" → suppresses the auto-add. No RecurringJob is in
# the `excluded` group, so nothing fires.

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-hdd-noreplica
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "1"
  staleReplicaTimeout: "30"
  fromBackup: ""
  fsType: "ext4"
  # Only schedule on disks tagged as "hdd"
  diskSelector: "hdd"
  recurringJobSelector: '[{"name":"excluded","isGroup":true}]'

