# Longhorn SSD storage class with no replication
# Use for data that doesn't need redundancy but benefits from SSD speed
# (e.g., media library, download caches)
#
# Volumes from this class are NOT auto-enrolled in the `default` recurring-job
# group — single-replica volumes hold replaceable data and shouldn't be backed
# up to B2. The empty `recurringJobSelector` overrides Longhorn's CSI default
# of labeling new volumes with `recurring-job-group.longhorn.io/default=enabled`.

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-ssd-noreplica
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "1"
  staleReplicaTimeout: "30"
  fromBackup: ""
  fsType: "ext4"
  diskSelector: "ssd"
  dataLocality: "best-effort"
  recurringJobSelector: '[]'
