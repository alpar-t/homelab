# Longhorn SSD storage class with no replication
# Use for data that doesn't need redundancy but benefits from SSD speed
# (e.g., media library, download caches)

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-ssd-noreplica
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "1"
  staleReplicaTimeout: "30"
  fromBackup: ""
  fsType: "ext4"
  diskSelector: "ssd"
  dataLocality: "best-effort"
