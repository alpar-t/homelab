# Arr stack — qBittorrent, Sonarr, Radarr, Prowlarr as sidecar containers
# Sharing RWO volumes within the same pod (no NFS needed)
# Hardlinks work because containers share the same filesystem mounts

apiVersion: apps/v1
kind: Deployment
metadata:
  name: arr-stack
  namespace: media
  labels:
    app.kubernetes.io/name: arr-stack
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: arr-stack
  template:
    metadata:
      labels:
        app.kubernetes.io/name: arr-stack
    spec:
      nodeSelector:
        kubernetes.io/hostname: buksi
      containers:
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:latest@sha256:8f7a1da9644340c737e3211ecc910a416d4295076e6b2824a4afcd1f4e3576e2
          ports:
            - containerPort: 8080
              name: qbit-http
            - containerPort: 6881
              name: bittorrent-tcp
              protocol: TCP
            - containerPort: 6881
              name: bittorrent-udp
              protocol: UDP
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Europe/Bucharest"
            - name: WEBUI_PORT
              value: "8080"
          volumeMounts:
            - name: qbittorrent-config
              mountPath: /config
            - name: qbit-incomplete
              mountPath: /incomplete
            - name: movies-data
              mountPath: /data/movies
            - name: tv-data
              mountPath: /data/tv
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              cpu: 4000m
              memory: 4Gi
          livenessProbe:
            tcpSocket:
              port: qbit-http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: qbit-http
            initialDelaySeconds: 10
            periodSeconds: 10
        - name: sonarr
          image: lscr.io/linuxserver/sonarr:latest@sha256:e6c9a091735fede0c2a205c69e7d4c2f0188eaf2bec7e42d8a26c017e5f2a910
          ports:
            - containerPort: 8989
              name: sonarr-http
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Europe/Bucharest"
            - name: SONARR__AUTH__METHOD
              value: "External"
            - name: SONARR__AUTH__REQUIRED
              value: "DisabledForLocalAddresses"
          volumeMounts:
            - name: sonarr-config
              mountPath: /config
            - name: tv-data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /ping
              port: sonarr-http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ping
              port: sonarr-http
            initialDelaySeconds: 10
            periodSeconds: 10
        - name: radarr
          image: lscr.io/linuxserver/radarr:latest@sha256:b01097ad2d948c9f5eca39eb60bb529e2e55b0738c4bf7db09383bef0abab59d
          ports:
            - containerPort: 7878
              name: radarr-http
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Europe/Bucharest"
            - name: RADARR__AUTH__METHOD
              value: "External"
            - name: RADARR__AUTH__REQUIRED
              value: "DisabledForLocalAddresses"
          volumeMounts:
            - name: radarr-config
              mountPath: /config
            - name: movies-data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 3Gi
          livenessProbe:
            httpGet:
              path: /ping
              port: radarr-http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ping
              port: radarr-http
            initialDelaySeconds: 10
            periodSeconds: 10
        - name: prowlarr
          image: lscr.io/linuxserver/prowlarr:latest@sha256:c5de2a8758a05594319263e7691c1dce56899442ed1720d6eca216c0958f4caf
          ports:
            - containerPort: 9696
              name: prowlarr-http
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Europe/Bucharest"
            - name: PROWLARR__AUTH__METHOD
              value: "External"
            - name: PROWLARR__AUTH__REQUIRED
              value: "DisabledForLocalAddresses"
          volumeMounts:
            - name: prowlarr-config
              mountPath: /config
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /ping
              port: prowlarr-http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ping
              port: prowlarr-http
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: qbittorrent-config
          persistentVolumeClaim:
            claimName: qbittorrent-config
        - name: qbit-incomplete
          persistentVolumeClaim:
            claimName: qbit-incomplete
        - name: movies-data
          persistentVolumeClaim:
            claimName: movies-data
        - name: tv-data
          persistentVolumeClaim:
            claimName: tv-data
        - name: sonarr-config
          persistentVolumeClaim:
            claimName: sonarr-config
        - name: radarr-config
          persistentVolumeClaim:
            claimName: radarr-config
        - name: prowlarr-config
          persistentVolumeClaim:
            claimName: prowlarr-config
---
# Services — all select the arr-stack pod, route to different container ports

apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: media
  labels:
    app.kubernetes.io/name: qbittorrent
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: arr-stack
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent-bt
  namespace: media
  labels:
    app.kubernetes.io/name: qbittorrent
  annotations:
    metallb.universe.tf/loadBalancerIPs: 192.168.1.205
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: arr-stack
  ports:
    - name: bittorrent-tcp
      port: 6881
      targetPort: 6881
      protocol: TCP
    - name: bittorrent-udp
      port: 6881
      targetPort: 6881
      protocol: UDP
---
apiVersion: v1
kind: Service
metadata:
  name: sonarr
  namespace: media
  labels:
    app.kubernetes.io/name: sonarr
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: arr-stack
  ports:
    - name: http
      port: 8989
      targetPort: 8989
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: radarr
  namespace: media
  labels:
    app.kubernetes.io/name: radarr
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: arr-stack
  ports:
    - name: http
      port: 7878
      targetPort: 7878
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: prowlarr
  namespace: media
  labels:
    app.kubernetes.io/name: prowlarr
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: arr-stack
  ports:
    - name: http
      port: 9696
      targetPort: 9696
      protocol: TCP
