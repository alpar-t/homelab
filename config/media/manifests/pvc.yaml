# Media storage split across SSD (downloads) and HDD (completed + library)
# Hardlinks work within each HDD volume (same filesystem)
#
# BACKUP EXCLUSION: media volumes excluded from Longhorn weekly backups.
# See config/longhorn/manifests/backup-exclusions.yaml

# SSD for active torrent downloads — isolates random I/O from streaming
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qbit-incomplete
  namespace: media
  labels:
    app.kubernetes.io/name: qbittorrent
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-ssd-noreplica
  resources:
    requests:
      storage: 300Gi
---
# Movies: completed downloads + organized library (Radarr hardlinks within)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: movies-data
  namespace: media
  labels:
    app.kubernetes.io/part-of: media-stack
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: longhorn-hdd-noreplica
  resources:
    requests:
      storage: 1500Gi
---
# TV: completed downloads + organized library (Sonarr hardlinks within)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tv-data
  namespace: media
  labels:
    app.kubernetes.io/part-of: media-stack
spec:
