# qBittorrent — optimized for fast downloads
# Incomplete downloads on SSD (random I/O), completed on HDD (sequential)
# Uses categories to route: "radarr" → /data/movies/, "sonarr" → /data/tv/

apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: media
  labels:
    app.kubernetes.io/name: qbittorrent
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: qbittorrent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qbittorrent
    spec:
      containers:
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:latest
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 6881
              name: bittorrent-tcp
              protocol: TCP
            - containerPort: 6881
              name: bittorrent-udp
              protocol: UDP
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Europe/Bucharest"
            - name: WEBUI_PORT
              value: "8080"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: incomplete
              mountPath: /incomplete
            - name: movies-data
              mountPath: /data/movies
            - name: tv-data
              mountPath: /data/tv
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              cpu: 4000m
              memory: 4Gi
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: qbittorrent-config
        - name: incomplete
          persistentVolumeClaim:
            claimName: qbit-incomplete
        - name: movies-data
          persistentVolumeClaim:
            claimName: movies-data
        - name: tv-data
          persistentVolumeClaim:
            claimName: tv-data
---
# qBittorrent Web UI service (accessed via ingress with auth_request)
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent
  namespace: media
  labels:
    app.kubernetes.io/name: qbittorrent
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: qbittorrent
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
---
# qBittorrent BitTorrent port — exposed via MetalLB for incoming peer connections
# Port-forward 6881 TCP+UDP on your router to 192.168.1.205
apiVersion: v1
kind: Service
metadata:
  name: qbittorrent-bt
  namespace: media
  labels:
    app.kubernetes.io/name: qbittorrent
  annotations:
    metallb.universe.tf/loadBalancerIPs: 192.168.1.205
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: qbittorrent
  ports:
    - name: bittorrent-tcp
      port: 6881
      targetPort: 6881
      protocol: TCP
    - name: bittorrent-udp
      port: 6881
      targetPort: 6881
      protocol: UDP
