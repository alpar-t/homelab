---
# Pi-hole DNS Service - LoadBalancer via MetalLB
# Provides a stable IP address for DNS (192.168.1.202)
# Configure your router/DHCP to use this IP as DNS server
# Hot spare failover: only active instance receives traffic, standby takes over on failure
apiVersion: v1
kind: Service
metadata:
  name: pihole-dns
  namespace: pihole
  labels:
    app: pihole
  annotations:
    # Request a specific IP from MetalLB
    metallb.universe.tf/loadBalancerIPs: "192.168.1.202"
spec:
  type: LoadBalancer
  # Local policy = hot spare behavior:
  # - MetalLB announces IP from one node only
  # - Only the pod on that node receives traffic
  # - If node dies, MetalLB fails over to the other node
  # Bonus: Preserves real client IPs in Pi-hole logs
  externalTrafficPolicy: Local
  selector:
    # Selects both pihole (primary) and pihole-2 (secondary) pods
    app: pihole
  ports:
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP
---
# Web UI Service - ClusterIP (accessed via oauth2-proxy or directly)
# Note: This round-robins between both Pi-holes internally.
# The active DNS pod will have the current query logs; standby will have older/empty logs.
apiVersion: v1
kind: Service
metadata:
  name: pihole-web
  namespace: pihole
  labels:
    app: pihole
spec:
  type: ClusterIP
  selector:
    # Selects both pihole (primary) and pihole-2 (secondary) pods
    app: pihole
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
