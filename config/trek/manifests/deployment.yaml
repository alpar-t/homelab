apiVersion: v1
kind: Service
metadata:
  name: trek
  namespace: trek
  labels:
    app: trek
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  type: ClusterIP
  selector:
    app: trek
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trek
  namespace: trek
  labels:
    app: trek
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: trek
  template:
    metadata:
      labels:
        app: trek
    spec:
      containers:
        - name: trek
          image: mauriceboe/trek:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: APP_URL
              value: "https://travel.newjoy.ro"
            - name: TZ
              value: "Europe/Bucharest"
            - name: TRUST_PROXY
              value: "1"
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: trek-secrets
                  key: encryption_key
            - name: OIDC_ISSUER
              value: "https://auth.newjoy.ro"
            - name: OIDC_DISPLAY_NAME
              value: "Pocket ID"
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: trek-oidc
                  key: client_id
                  optional: true
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: trek-oidc
                  key: client_secret
                  optional: true
            - name: OIDC_ADMIN_CLAIM
              value: "groups"
            - name: OIDC_ADMIN_VALUE
              value: "trek-admins"
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: uploads
              mountPath: /app/uploads
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: trek-data
        - name: uploads
          persistentVolumeClaim:
            claimName: trek-uploads
