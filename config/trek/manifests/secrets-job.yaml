apiVersion: v1
kind: ServiceAccount
metadata:
  name: trek-secrets-sa
  namespace: trek
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: trek-secrets-role
  namespace: trek
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: trek-secrets-rolebinding
  namespace: trek
  annotations:
    argocd.argoproj.io/sync-wave: "0"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: trek-secrets-role
subjects:
  - kind: ServiceAccount
    name: trek-secrets-sa
    namespace: trek
---
apiVersion: batch/v1
kind: Job
metadata:
  name: trek-secrets-generator
  namespace: trek
  labels:
    app: trek
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: trek-secrets-sa
      containers:
        - name: generator
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              if kubectl get secret trek-secrets -n trek 2>/dev/null; then
                echo "Secret already exists, skipping generation"
                exit 0
              fi
              ENCRYPTION_KEY=$(openssl rand -hex 32)
              kubectl create secret generic trek-secrets \
                --namespace=trek \
                --from-literal=encryption_key="$ENCRYPTION_KEY"
              echo "Secret created successfully"
